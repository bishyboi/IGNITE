<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE – Magic Spell Caster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

    <!-- ── Camera + drawing area ────────────────────────────────────────── -->
    <div id="camera-area">

        <!-- Tracker mode toggle bar (above the camera frame) -->
        <div id="tracker-mode-bar">
            <button id="btn-hand" class="mode-btn active" title="Track via MediaPipe hand landmarks">
                ✋ Hand
            </button>
            <button id="btn-ir" class="mode-btn" title="Track via IR camera + reflective wand tip">
                🪄 IR Wand
            </button>
            <select id="ir-camera-select" class="hidden" title="Select IR camera device">
                <option value="">Select camera…</option>
            </select>
        </div>

        <div id="camera-wrapper">

            <!-- Webcam / IR camera feed -->
            <video id="webcam" autoplay playsinline muted></video>

            <!-- Canvas overlay: finger trail, glow, particles, wand ring -->
            <canvas id="overlay"></canvas>

            <!-- Status bar at the bottom of the camera view -->
            <div id="status-bar">
                <div id="draw-status" class="idle">
                    <span id="status-icon">✋</span>
                    <span id="status-text">Show your hand to begin</span>
                </div>
            </div>

            <!-- Bottom toast notification -->
            <div id="spell-toast">
                <div id="toast-emoji"></div>
                <div class="toast-text">
                    <div id="toast-name"></div>
                    <div id="toast-desc"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- ── Spell book sidebar ────────────────────────────────────────────── -->
    <div id="spellbook">
        <h2 class="spellbook-title">📖 Spell Book</h2>
        <p class="spellbook-hint">Pinch thumb + index to draw</p>
        <!-- Cards injected by app.js -->
        <div id="spell-cards"></div>
    </div>

</div>

<!--
    Load order:
      1. MediaPipe CDN (Hands + Camera utilities)
      2. Our maths  (frechet.js — euclideanDist is needed by handtracking.js)
      3. Spell defs (spells.js — needs curveSimilarity from frechet.js)
      4. Tracker    (handtracking.js — needs euclideanDist)
      5. App        (app.js — orchestrates everything)
-->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
        crossorigin="anonymous"></script>

<script src="js/frechet.js"></script>
<script src="js/spells.js"></script>
<script src="js/handtracking.js"></script>
<script src="js/irtracker.js"></script>
<script src="js/app.js"></script>

</body>
</html>
