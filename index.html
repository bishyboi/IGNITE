<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITE – Magic Spell Caster</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

    <!-- ── Camera + drawing area ────────────────────────────────────── -->
    <div id="camera-area">
        <div id="camera-wrapper">

            <!-- Webcam feed (CSS-mirrored in style.css) -->
            <video id="webcam" autoplay playsinline muted></video>

            <!-- Canvas overlay: finger trail, glow, particles -->
            <canvas id="overlay"></canvas>

            <!-- Status bar at the bottom of the camera view -->
            <div id="status-bar">
                <div id="draw-status" class="idle">
                    <span id="status-icon">✋</span>
                    <span id="status-text">Show your hand to begin</span>
                </div>
            </div>

            <!-- Spell-match success overlay -->
            <div id="spell-result" class="hidden">
                <div id="result-content">
                    <div id="result-emoji"></div>
                    <div id="result-name"></div>
                    <div id="result-desc"></div>
                    <div id="result-score"></div>
                </div>
            </div>

            <!-- Spell-match failure overlay -->
            <div id="spell-fail" class="hidden">
                <div id="fail-content">
                    <div id="fail-icon">❓</div>
                    <div id="fail-text">Not a recognised spell… try again!</div>
                </div>
            </div>

        </div>
    </div>

    <!-- ── Spell book sidebar ────────────────────────────────────────── -->
    <div id="spellbook">
        <h2 class="spellbook-title">📖 Spell Book</h2>
        <p class="spellbook-hint">Pinch thumb + index to draw</p>
        <!-- Cards injected by app.js -->
        <div id="spell-cards"></div>
    </div>

</div>

<!--
    Load order:
      1. MediaPipe CDN (Hands + Camera utilities)
      2. Our maths  (frechet.js — euclideanDist is needed by handtracking.js)
      3. Spell defs (spells.js — needs curveSimilarity from frechet.js)
      4. Tracker    (handtracking.js — needs euclideanDist)
      5. App        (app.js — orchestrates everything)
-->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
        crossorigin="anonymous"></script>

<script src="js/frechet.js"></script>
<script src="js/spells.js"></script>
<script src="js/handtracking.js"></script>
<script src="js/app.js"></script>

</body>
</html>
